apiVersion: batch/v1
kind: Job
metadata:
  name: g1-crud
  namespace: database
  labels:
    experiment: benign
    scenario: g1-crud
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        experiment: benign
        scenario: g1-crud
    spec:
      restartPolicy: Never
      containers:
        - name: mariadb-client
          image: mariadb:11.8
          env:
            - name: APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-password
                  key: password
          command:
            - sh
            - -c
            - |
              set -eu
              mariadb \
                --protocol=TCP \
                --host=mariadb-galera.database.svc.cluster.local \
                --port=3306 \
                --user=appuser \
                --password="$APP_PASSWORD" \
                appdb <<'SQL'
              SELECT CURRENT_USER() AS authenticated_as;
              SELECT DATABASE() AS current_database;
              SELECT @@hostname AS connected_to;

              SHOW SESSION STATUS LIKE 'Ssl_version';
              SHOW SESSION STATUS LIKE 'Ssl_cipher';

              DELETE FROM connection_test
              WHERE id = 1;

              INSERT INTO connection_test (id, message)
              VALUES (1, 'Initial test message');

              SELECT 'INSERT successful' AS step;
              SELECT * FROM connection_test WHERE id = 1;

              UPDATE connection_test
              SET message = 'Updated test message'
              WHERE id = 1;

              SELECT 'UPDATE successful' AS step;
              SELECT * FROM connection_test WHERE id = 1;

              DELETE FROM connection_test
              WHERE id = 1;

              SELECT 'DELETE successful' AS step;
              SELECT COUNT(*) AS remaining_rows
              FROM connection_test
              WHERE id = 1;

